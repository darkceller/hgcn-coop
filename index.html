<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主婦聯盟消費合作社-新竹分社官網</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --primary-green: #2d5a27; 
            --accent-orange: #e67e22;
            --light-bg: #f9f9f9;
        }
        body { font-family: "Microsoft JhengHei", sans-serif; line-height: 1.6; margin: 0; color: #333; background-color: var(--light-bg); }
        header { background: white; border-bottom: 3px solid var(--primary-green); padding: 1rem 0; position: sticky; top: 0; z-index: 1000; }
        nav { display: flex; justify-content: space-around; align-items: center; max-width: 1000px; margin: auto; flex-wrap: wrap; }
        nav a { text-decoration: none; color: var(--primary-green); font-weight: bold; padding: 0.5rem; }
        
        /* 調整 Hero 區塊以適應圖片 */
        .hero { background: white; padding: 2rem 1rem; text-align: center; }
        .hero img { max-width: 100%; height: auto; border-radius: 8px; }

        .container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
        .card { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { display: inline-block; background: var(--primary-green); color: white; padding: 0.5rem 1rem; border-radius: 5px; text-decoration: none; margin-top: 1rem; }
        .btn:hover { background: #3e7a36; }
        
        footer { background: #333; color: white; text-align: center; padding: 2rem 0; margin-top: 3rem; }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="index.html">首頁</a>
            <a href="https://darkceller.github.io/coop-calendar/" target="_blank">活動月曆</a>
            <a href="https://darkceller.github.io/coop-meeting/" target="_blank">雲端議事</a>
            <a href="https://www.hucc-coop.tw/register" target="_blank">加入我們</a>
            <a href="https://www.hucc-coop.tw/" target="_blank">本社官網</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <img src="image_0.png" alt="主婦聯盟合作社 - 每一筆消費都在為你心目中的社會投票">
        </section>

        <div class="container">
            <section id="news">
                <h2>最新公告</h2>
                <div class="card">
                    <p><strong>[公告]</strong> 2026年3月8日 本系統測試上線中</p>
                </div>
            </section>

            <section id="quick-links" style="margin-top: 3rem;">
                <h2>快速服務</h2>
                <div class="grid">
                    <div class="card">
                        <h3>活動月曆</h3>
                        <p>掌握新竹各站點的最新課程與站務活動。</p>
                        <a href="https://darkceller.github.io/coop-calendar/" class="btn" target="_blank">查看月曆</a>
                    </div>
                    <div class="card">
                        <h3>雲端議事</h3>
                        <p>秉持民主參與精神，所有會議記錄公開透明。</p>
                        <a href="https://darkceller.github.io/coop-meeting/" class="btn" target="_blank">進入系統</a>
                    </div>
                    <div class="card">
                        <h3>加入我們</h3>
                        <p>認同共同購買理念，歡迎加入合作社大家庭。</p>
                        <a href="https://www.hucc-coop.tw/register" class="btn" target="_blank">線上入社</a>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 台灣主婦聯盟生活消費合作社 新竹分社</p>
        <p>系統維護 dark.celler@gmail.com</p>
    </footer>

</body>
</html>
